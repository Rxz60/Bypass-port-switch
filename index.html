<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تخطي مفتاح دلتا</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:'Cairo',sans-serif;
background:#000;
overflow-x:hidden;
color:white;
min-height:100vh;
padding:25px;
}
.background-image{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://raw.githubusercontent.com/Rxz60/-/refs/heads/main/IMG_3621.jpeg");
background-size:cover;
background-position:center;
opacity:.38;
z-index:0;
filter:brightness(.9) contrast(1.2) saturate(2);
}
.spinning-clock{
position:fixed;
top:50%;
left:50%;
width:420px;
height:420px;
transform:translate(-50%,-50%);
opacity:.75;
pointer-events:none;
z-index:1;
filter:
drop-shadow(0 0 40px rgba(0,0,0,.9))
drop-shadow(0 0 100px rgba(0,0,0,.5));
animation:spin 2s linear infinite;
}
@keyframes spin{
0%{
transform:translate(-50%,-50%) rotate(0deg);
}
100%{
transform:translate(-50%,-50%) rotate(360deg);
}
}
.glow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
border:3px solid transparent;
border-radius:20px;
animation:g 1.5s infinite alternate;
box-shadow:
inset 0 0 100px 25px rgba(0,0,0,.7),
inset 0 0 200px 50px rgba(20,20,20,.5),
0 0 80px 20px rgba(0,0,0,.8),
0 0 150px 40px rgba(40,40,40,.6),
0 0 250px 70px rgba(255,255,255,.08);
}
@keyframes g{
0%{
box-shadow:
inset 0 0 80px 20px rgba(0,0,0,.6),
inset 0 0 180px 40px rgba(15,15,15,.4),
0 0 60px 15px rgba(0,0,0,.7),
0 0 120px 30px rgba(30,30,30,.5),
0 0 200px 60px rgba(255,255,255,.06);
border-color:rgba(30,30,30,.4);
}
50%{
box-shadow:
inset 0 0 140px 35px rgba(0,0,0,.85),
inset 0 0 250px 65px rgba(30,30,30,.6),
0 0 110px 30px rgba(0,0,0,.9),
0 0 180px 55px rgba(50,50,50,.7),
0 0 300px 90px rgba(255,255,255,.12);
border-color:rgba(60,60,60,.7);
}
100%{
box-shadow:
inset 0 0 100px 25px rgba(0,0,0,.7),
inset 0 0 200px 50px rgba(20,20,20,.5),
0 0 80px 20px rgba(0,0,0,.8),
0 0 150px 40px rgba(40,40,40,.6),
0 0 250px 70px rgba(255,255,255,.08);
border-color:rgba(30,30,30,.4);
}
}
.wrap{
position:relative;
z-index:2;
max-width:900px;
width:100%;
margin:auto;
}
.logo{
font-size:70px;
font-weight:900;
text-align:center;
color:#ffffff;
margin-top:20px;
margin-bottom:60px;
text-shadow:
0 0 20px #ffffff,
0 0 40px #cccccc,
0 0 80px #999999,
0 0 150px #666666;
}
.search-box{
display:flex;
gap:20px;
margin-bottom:55px;
width:100%;
align-items:center;
}
.search-input{
flex:1;
width:100%;
height:100px;
background:#050505;
border:2px solid #1a1a1a;
border-radius:30px;
padding:0 40px;
font-size:34px;
color:white;
outline:none;
box-shadow:
0 0 30px rgba(0,0,0,.15),
inset 0 0 25px rgba(0,0,0,.08);
}
.search-input:focus{
border-color:#444444;
box-shadow:
0 0 50px rgba(0,0,0,.55),
0 0 120px rgba(0,0,0,.3),
inset 0 0 30px rgba(0,0,0,.2);
}
.search-btn{
width:240px;
height:100px;
border:none;
border-radius:30px;
background:linear-gradient(180deg,#1a1a1a,#000000);
font-size:36px;
font-weight:900;
color:white;
cursor:pointer;
box-shadow:
0 0 45px rgba(0,0,0,.55),
0 0 120px rgba(0,0,0,.2);
flex-shrink:0;
}
.loading{
text-align:center;
font-size:55px;
font-weight:900;
color:#ffffff;
margin-top:70px;
text-shadow:0 0 25px #ffffff;
}
.card{
background:linear-gradient(180deg,#090909,#020202);
border:2px solid #1a1a1a;
border-radius:35px;
overflow:hidden;
box-shadow:
0 0 35px rgba(0,0,0,.12),
inset 0 0 20px rgba(0,0,0,.05);
}
.card-content{
padding:25px;
}
.key-title{
font-size:34px;
font-weight:900;
margin-bottom:12px;
color:#ffffff;
text-shadow:0 0 15px rgba(255,255,255,.55);
}
.key-box{
background:#000;
border:1px solid #1a1a1a;
border-radius:20px;
padding:18px;
font-size:20px;
margin-bottom:18px;
color:#cccccc;
text-align:center;
direction:ltr;
word-break:break-word;
}
.copy-btn{
width:100%;
height:70px;
border:none;
border-radius:20px;
background:linear-gradient(180deg,#1a1a1a,#000000);
font-size:24px;
font-weight:900;
color:white;
cursor:pointer;
}
::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-thumb{
background:#333333;
border-radius:20px;
}
@media(max-width:900px){
.logo{
font-size:45px;
}
.search-box{
flex-direction:column;
}
.search-btn{
width:100%;
height:100px;
}
.search-input{
font-size:26px;
}
.spinning-clock{
width:280px;
height:280px;
}
}
</style>
</head>
<body>
<div class="background-image"></div>
<img
class="spinning-clock"
src="https://raw.githubusercontent.com/Rxz60/-/refs/heads/main/6700FF4D-7B89-4791-924C-76EEC0B76EBD.png"
>
<div class="glow"></div>
<div class="wrap">
<div class="logo">
🔓 تخطي مفتاح دلتا
</div>
<div class="search-box">
<input
type="text"
id="link"
class="search-input"
placeholder="حط رابط المنفذ هنا..."
>
<button
class="search-btn"
onclick="getKey()"
>
🔍 جيب المفتاح
</button>
</div>
<div
class="results"
id="results"
>
</div>
</div>
<script>
async function getKey(){
var link=document.getElementById("link").value;
var results=document.getElementById("results");
if(!link)return;
results.innerHTML=`
<div class="loading">
⏳ جاري التخطي...
</div>
`;
try{
var hwid="Syn-Fingerprint-"+Math.random().toString(36).substring(2,15);
var apiUrl=link;
if(link.includes("deltaexploits.net")||link.includes("delta")){
var keyPart=link.split("?")[1]||"";
apiUrl="https://deltaexploits.net/api/key?hwid="+hwid+"&"+keyPart;
}
var response=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(apiUrl));
var text=await response.text();
var foundKey="";
var match1=text.match(/["']key["']\s*:\s*["']([^"']+)["']/i);
if(match1&&match1[1]){
foundKey=match1[1];
}
if(!foundKey){
var match2=text.match(/["']([A-Za-z0-9]{20,50})["']/);
if(match2&&match2[1]){
foundKey=match2[1];
}
}
if(!foundKey){
var match3=text.match(/([A-Za-z0-9]{24,36})/);
if(match3&&match3[1]){
foundKey=match3[1];
}
}
if(!foundKey){
foundKey=text.substring(0,36);
}
results.innerHTML=`
<div class="card">
<div class="card-content">
<div class="key-title">
🔑 المفتاح الجاهز
</div>
<div class="key-box">
${foundKey}
</div>
<button
class="copy-btn"
onclick='copyKey("${foundKey}")'
>
📋 نسخ المفتاح
</button>
</div>
</div>
`;
}catch(e){
results.innerHTML=`
<div class="card">
<div class="card-content">
<div class="key-title">
❌ فشل التخطي
</div>
<div class="key-box">
تأكد من الرابط وحاول مرة أخرى
</div>
</div>
</div>
`;
}
}
function copyKey(text){
navigator.clipboard.writeText(text);
alert("✅ تم نسخ المفتاح");
}
</script>
</body>
</html>
